<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#F0EEE8" />
<title>Whim — choose a new password</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@700;800&family=IBM+Plex+Mono&display=swap" rel="stylesheet" />
<style>
  :root { --canvas:#F0EEE8; --ink:#17150F; --muted:#7C766A; --accent:#2740E0; --destructive:#D23B2C; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { min-height:100dvh; display:flex; align-items:center; justify-content:center; background:var(--canvas); color:var(--ink);
         font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif; padding:32px 24px; }
  main { max-width:380px; width:100%; }
  .stamp { display:inline-block; padding:7px 14px; border:1.5px solid var(--accent); border-radius:6px; transform:rotate(-6deg);
           color:var(--accent); font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.22em; text-transform:uppercase; margin-bottom:28px; }
  h1 { font-family:'Bricolage Grotesque',sans-serif; font-weight:800; font-size:34px; line-height:1.06; letter-spacing:-0.02em; margin-bottom:10px; }
  p { font-size:15px; line-height:1.55; color:var(--muted); }
  input { width:100%; margin-top:18px; padding:15px 16px; font-size:16px; color:var(--ink); background:#fff;
          border:1px solid rgba(23,21,15,0.12); border-radius:16px; outline:none; }
  input:focus { border-color:var(--accent); }
  button { width:100%; margin-top:14px; padding:16px; background:var(--accent); color:#fff; border:none; border-radius:999px;
           font-family:'Bricolage Grotesque',sans-serif; font-weight:700; font-size:16px; cursor:pointer; }
  button:disabled { opacity:0.55; }
  .msg { margin-top:14px; font-size:14px; }
  .msg.err { color:var(--destructive); }
  .msg.ok { color:var(--accent); font-weight:600; }
  .hidden { display:none; }
</style>
</head>
<body>
<main>
  <div class="stamp">Whim &#10022; Reset</div>

  <div id="form-view">
    <h1>Choose a new password.</h1>
    <p>At least 8 characters. After saving, sign in with it in the Whim app.</p>
    <input id="pw" type="password" placeholder="New password" autocomplete="new-password" minlength="8" />
    <button id="save">Save password</button>
    <p class="msg err hidden" id="err"></p>
  </div>

  <div id="done-view" class="hidden">
    <h1>Password updated.</h1>
    <p>You're set — open Whim on your phone and sign in with your new password.</p>
  </div>

  <div id="expired-view" class="hidden">
    <h1>This link has expired.</h1>
    <p>Open Whim, tap "Forgot password?" and request a fresh one.</p>
  </div>
</main>
<script>
  // Supabase's recovery email redirects here with a short-lived access token in
  // the URL hash. The publishable (anon) key below is safe to embed — it only
  // works together with that user-specific token.
  var SUPABASE_URL = 'https://gvqldgkdtitueyijptmt.supabase.co';
  var ANON_KEY = 'sb_publishable_6q9uXYpQoDommoOVnUfZpQ__HKCMOem';

  var params = new URLSearchParams(location.hash.replace(/^#/, ''));
  var token = params.get('access_token');
  var show = function (id) {
    ['form-view', 'done-view', 'expired-view'].forEach(function (v) {
      document.getElementById(v).classList.toggle('hidden', v !== id);
    });
  };

  if (!token || params.get('error_description') || params.get('error')) {
    show('expired-view');
  }

  document.getElementById('save').addEventListener('click', async function () {
    var pw = document.getElementById('pw').value;
    var err = document.getElementById('err');
    err.classList.add('hidden');
    if (pw.length < 8) {
      err.textContent = 'Use at least 8 characters.';
      err.classList.remove('hidden');
      return;
    }
    this.disabled = true;
    try {
      var res = await fetch(SUPABASE_URL + '/auth/v1/user', {
        method: 'PUT',
        headers: {
          'apikey': ANON_KEY,
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ password: pw }),
      });
      if (res.ok) {
        show('done-view');
      } else {
        var body = await res.json().catch(function () { return {}; });
        err.textContent = body.msg || body.message || 'Couldn’t save — the link may have expired.';
        err.classList.remove('hidden');
        this.disabled = false;
      }
    } catch (e) {
      err.textContent = 'Network error — try again.';
      err.classList.remove('hidden');
      this.disabled = false;
    }
  });
</script>
</body>
</html>
